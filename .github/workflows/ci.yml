name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          node -c src/index.js
          node -c src/client.js
          node -c src/official.js
          node -c src/config.js
          node -c src/utils.js
          node -c src/setup.js
          node -c src/cli.js
          node -c src/oauth.js

      - name: Verify MCP server starts
        run: |
          timeout 5 node src/index.js 2>&1 || true
          echo "Server entry point loads without crash"

      - name: Check version consistency
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "package.json version: $PKG_VERSION"
          # Ensure package.json version exists and is valid semver
          echo "$PKG_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+' || { echo "Invalid version in package.json"; exit 1; }
